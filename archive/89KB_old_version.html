/* 左侧工具列 */

#toolbar-3d .btn3d{padding:2px 7px;border:1px solid transparent;border-radius:3px;background:transparent;color:rgba(255,255,255,0.6);cursor:pointer;font-size:10px;font-family:inherit}
#toolbar-3d .btn3d:hover{background:rgba(255,255,255,0.1);color:#fff}

/* 右侧属性面板 */
#props{position:absolute;top:42px;right:6px;z-index:100;width:200px;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);border-radius:6px;border:1px solid rgba(255,255,255,0.08);padding:8px;font-size:11px;display:none}
#props .row{display:flex;justify-content:space-between;padding:2px 0;color:rgba(255,255,255,0.6)}
#props .title{font-weight:600;color:#fff;margin-bottom:4px}

/* 右下面具栏 */
#furn-bar{height:32px;display:flex;align-items:center;gap:4px;padding:0 8px;border-top:1px solid rgba(255,255,255,0.08);background:rgba(22,22,40,0.8);flex-shrink:0;overflow-x:auto}
.furn-chip{padding:2px 8px;border:1px solid rgba(255,255,255,0.1);border-radius:10px;font-size:10px;cursor:pointer;white-space:nowrap;background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.6);transition:all .12s}
.furn-chip:hover{background:rgba(102,126,234,0.15);color:#fff;border-color:#667eea}

::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
</style>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/OrbitControls.js";


// ===================== PBR 材质系统 =====================
const texLoader = new THREE.TextureLoader();
const TEXTURE_LIB = {
  "橡木":{color:"./textures/wood_oak/Wood037_1K-JPG_Color.jpg",roughness:"./textures/wood_oak/Wood037_1K-JPG_Roughness.jpg",normal:"./textures/wood_oak/Wood037_1K-JPG_NormalGL.jpg",fallback:"#C4A882"},
  "大理石":{color:"./textures/marble_white/Marble003_1K-JPG_Color.jpg",roughness:"./textures/marble_white/Marble003_1K-JPG_Roughness.jpg",normal:"./textures/marble_white/Marble003_1K-JPG_NormalGL.jpg",fallback:"#E0D8D0"},
  "混凝土":{color:"./textures/concrete/Concrete020_1K-JPG_Color.jpg",roughness:"./textures/concrete/Concrete020_1K-JPG_Roughness.jpg",normal:"./textures/concrete/Concrete020_1K-JPG_NormalGL.jpg",fallback:"#A0A0A0"},
  "天鹅绒":{color:"./textures/fabric_velvet/Fabric013_1K-JPG_Color.jpg",roughness:"./textures/fabric_velvet/Fabric013_1K-JPG_Roughness.jpg",normal:"./textures/fabric_velvet/Fabric013_1K-JPG_NormalGL.jpg",fallback:"#7B6B8A"},
  "纯棉":{color:"./textures/fabric_cotton/Fabric019_1K-JPG_Color.jpg",roughness:"./textures/fabric_cotton/Fabric019_1K-JPG_Roughness.jpg",normal:"./textures/fabric_cotton/Fabric019_1K-JPG_NormalGL.jpg",opacity:"./textures/fabric_cotton/Fabric019_1K-JPG_Opacity.jpg",fallback:"#F0EDE8"},
  "金属":{color:"./textures/metal_brushed/Metal032_1K-JPG_Color.jpg",roughness:"./textures/metal_brushed/Metal032_1K-JPG_Roughness.jpg",normal:"./textures/metal_brushed/Metal032_1K-JPG_NormalGL.jpg",metalness:"./textures/metal_brushed/Metal032_1K-JPG_Metalness.jpg",fallback:"#A0A0A0"},
  "瓷砖":{color:"./textures/tile_ceramic/Tiles065_1K-JPG_Color.jpg",roughness:"./textures/tile_ceramic/Tiles065_1K-JPG_Roughness.jpg",normal:"./textures/tile_ceramic/Tiles065_1K-JPG_NormalGL.jpg",fallback:"#E8E0D0"},
  "皮革":{color:"./textures/leather/Leather008_1K-JPG_Color.jpg",roughness:"./textures/leather/Leather008_1K-JPG_Roughness.jpg",normal:"./textures/leather/Leather008_1K-JPG_NormalGL.jpg",fallback:"#8B5E3C"},
  "墙面":{color:"./textures/plaster_wall/Plaster001_1K-JPG_Color.jpg",roughness:"./textures/plaster_wall/Plaster001_1K-JPG_Roughness.jpg",normal:"./textures/plaster_wall/Plaster001_1K-JPG_NormalGL.jpg",fallback:"#F0EBE5"},
};

const textureCache = {};

function loadPBRMaterial(texName, opts = {}){
  const lib = TEXTURE_LIB[texName];
  if(!lib) return new THREE.MeshStandardMaterial({color:opts.color||"#cccccc",roughness:0.6});
  
  const mat = new THREE.MeshStandardMaterial({
    color: opts.color || undefined,
    roughness: opts.roughness !== undefined ? opts.roughness : 0.6,
    metalness: opts.metalness || 0,
    map: texLoader.load(lib.color),
    roughnessMap: texLoader.load(lib.roughness),
    normalMap: texLoader.load(lib.normal),
  });
  
  if(lib.metalness) mat.metalnessMap = texLoader.load(lib.metalness);
  if(lib.opacity) {
    mat.alphaMap = texLoader.load(lib.opacity);
    mat.transparent = true;
  }
  
  return mat;
}

// ===================== CAD DATA MODEL =====================
let walls = [];        // {id,x1,y1,x2,y2,thick,type}
let doors = [];        // {id,wallId,pos,width}
let windows = [];      // {id,wallId,pos,width}
let rooms = [];        // {id,name,corners,color,area}
let dims = [];         // {id,x1,y1,x2,y2,offset}
let furniture = [];    // {id,name,cat,x,y,w,d,color}
let nextId = 1;

// Undo
let history = [];
let histIdx = -1;
const MAX_HIST = 50;

function saveState(){const s=JSON.stringify({walls,doors,windows,rooms,dims,furniture});history=history.slice(0,histIdx+1);history.push(s);if(history.length>MAX_HIST)history.shift();histIdx=history.length-1;}

function restoreState(i){if(i<0||i>=history.length)return;const s=JSON.parse(history[i]);walls=s.walls;doors=s.doors;windows=s.windows;rooms=s.rooms;dims=s.dims;furniture=s.furniture;histIdx=i;render2D();rebuild3D();updateStatus();}

// ===================== 2D CANVAS ENGINE =====================
const c2 = document.getElementById("canvas-2d"), ctx = c2.getContext("2d");
let cam = {x:0,y:0,zoom:0.8};
let tool = "select";
let drag = null, sel = null, hover = null;
let mDown = null, mPos = null;
let wallDraw = null; // {x,y} for wall drawing start

function resize2D(){const w=document.getElementById("canvas-wrap");c2.width=w.clientWidth;c2.height=w.clientHeight;render2D()}
window.addEventListener("resize",resize2D);

function w2s(wx,wy){return {x:c2.width/2+(wx-cam.x)*cam.zoom,y:c2.height/2-(wy-cam.y)*cam.zoom}}
function s2w(sx,sy){return {x:(sx-c2.width/2)/cam.zoom+cam.x,y:-(sy-c2.height/2)/cam.zoom+cam.y}}

function snapToGrid(p){const g=50;return{x:Math.round(p.x/g)*g,y:Math.round(p.y/g)*g}}
function snapToEndpoint(p,dist=20){
  for(const w of walls){
    for(const ep of [{x:w.x1,y:w.y1},{x:w.x2,y:w.y2}]){
      if(Math.hypot(p.x-ep.x,p.y-ep.y)*cam.zoom<dist)return ep;
    }
  }
  return null;
}

// ===================== 2D RENDER =====================
function render2D(){
  const W=c2.width,H=c2.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle="#161628";ctx.fillRect(0,0,W,H);
  // Background image tracing layer
  if(bgImage){ctx.save();ctx.globalAlpha=bgImageOpacity;ctx.drawImage(bgImage,0,0,W,H);ctx.restore();}

  // Grid
  const gs=50;const gsPx=gs*cam.zoom;
  if(gsPx>4 && gridVisible){
    const origin=w2s(0,0);ctx.strokeStyle="rgba(255,255,255,0.04)";ctx.lineWidth=1;
    for(let x=origin.x%gsPx;x<W;x+=gsPx){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
    for(let y=origin.y%gsPx;y<H;y+=gsPx){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  }

  // Rooms
  for(const r of rooms){
    const pts=r.corners.map(p=>w2s(p.x,p.y));
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
    ctx.closePath();
    ctx.fillStyle=r.color+"22";ctx.fill();
    // Apply hatch pattern
    if(r.hatch&&window.hatchPatterns[r.hatch]){
      var box=pts.reduce(function(a,p){return{x:Math.min(a.x,p.x),y:Math.min(a.y,p.y)}},{x:Infinity,y:Infinity});
      var box2=pts.reduce(function(a,p){return{x:Math.max(a.x,p.x),y:Math.max(a.y,p.y)}},{x:-Infinity,y:-Infinity});
      window.hatchPatterns[r.hatch](ctx,box.x,box.y,box2.x-box.x,box2.y-box.y,1);
    }
    ctx.strokeStyle=r.color+"44";ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
    const cx=pts.reduce((a,p)=>({x:a.x+p.x/pts.length,y:a.y+p.y/pts.length}),{x:0,y:0});
    ctx.fillStyle="rgba(255,255,255,0.3)";ctx.font="11px Microsoft YaHei";ctx.textAlign="center";
    ctx.fillText(r.name+" "+r.area+"m2",cx.x,cx.y);
  
  // Box select rectangle
  if(boxSelect){
    var bx1=Math.min(boxSelect.x1,boxSelect.x2);
    var by1=Math.min(boxSelect.y1,boxSelect.y2);
    var bx2=Math.max(boxSelect.x1,boxSelect.x2);
    var by2=Math.max(boxSelect.y1,boxSelect.y2);
    ctx.strokeStyle="#667eea";ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.strokeRect(bx1,by1,bx2-bx1,by2-by1);
    ctx.fillStyle="rgba(102,126,234,0.08)";ctx.fillRect(bx1,by1,bx2-bx1,by2-by1);
    ctx.setLineDash([]);
  }

  // Polyline preview
  if(tool==="polyline"&&polylinePts.length>0){
    for(var pi=1;pi<polylinePts.length;pi++){
      var pp1=w2s(polylinePts[pi-1].x,polylinePts[pi-1].y);
      var pp2=w2s(polylinePts[pi].x,polylinePts[pi].y);
      ctx.strokeStyle="#667eea";ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(pp1.x,pp1.y);ctx.lineTo(pp2.x,pp2.y);ctx.stroke();
      ctx.fillStyle="#667eea";ctx.beginPath();ctx.arc(pp1.x,pp1.y,4,0,Math.PI*2);ctx.fill();
    }
    // Line to cursor
    if(polylinePts.length>0&&mPos){
      var last=w2s(polylinePts[polylinePts.length-1].x,polylinePts[polylinePts.length-1].y);
      var cur=w2s(mPos.x,mPos.y);
      ctx.strokeStyle="rgba(102,126,234,0.4)";ctx.lineWidth=2;ctx.setLineDash([5,3]);
      ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(cur.x,cur.y);ctx.stroke();ctx.setLineDash([]);
      // Distance
      var dist=Math.hypot(mPos.x-polylinePts[polylinePts.length-1].x,mPos.y-polylinePts[polylinePts.length-1].y);
      ctx.fillStyle="rgba(102,126,234,0.8)";ctx.font="10px sans-serif";ctx.textAlign="center";
      ctx.fillText((dist/1000).toFixed(2)+"m",(last.x+cur.x)/2,(last.y+cur.y)/2-8);
    }
  }

// Scale bar
  var sbLen=2000;var sbPx=sbLen*cam.zoom;var sbX=20,sbY=c2.height-30;
  ctx.fillStyle="rgba(255,255,255,0.6)";
  ctx.fillRect(sbX,sbY,sbPx,3);
  ctx.fillRect(sbX,sbY-3,1,6);ctx.fillRect(sbX+sbPx,sbY-3,1,6);
  ctx.fillStyle="rgba(255,255,255,0.5)";
  ctx.font="9px sans-serif";ctx.textAlign="center";
  ctx.fillText((sbLen/1000)+"m",sbX+sbPx/2,sbY-6);
  }

  // Walls
  for(const w of walls){
    const p1=w2s(w.x1,w.y1),p2=w2s(w.x2,w.y2);
    const dx=p2.x-p1.x,dy=p2.y-p1.y;
    const len=Math.hypot(dx,dy);
    if(len<1)continue;
    const nx=-dy/len*w.thick*cam.zoom/2,ny=dx/len*w.thick*cam.zoom/2;
    ctx.beginPath();
    ctx.moveTo(p1.x+nx,p1.y+ny);ctx.lineTo(p2.x+nx,p2.y+ny);
    ctx.lineTo(p2.x-nx,p2.y-ny);ctx.lineTo(p1.x-nx,p1.y-ny);
    ctx.closePath();
    ctx.fillStyle=w.type==="外墙"?"rgba(200,200,210,0.25)":"rgba(200,200,210,0.12)";
    ctx.fill();
    ctx.strokeStyle=w.type==="外墙"?"rgba(200,200,220,0.6)":"rgba(200,200,220,0.35)";
    ctx.lineWidth=w===sel?2:1;
    if(w===hover&&tool==="select"){ctx.strokeStyle="#667eea";ctx.lineWidth=2}
    ctx.stroke();

    // endpoints
    if(w===sel||w===hover){
      ctx.fillStyle="#667eea";ctx.beginPath();ctx.arc(p1.x,p1.y,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(p1.x,p1.y,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#667eea";ctx.beginPath();ctx.arc(p2.x,p2.y,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(p2.x,p2.y,3,0,Math.PI*2);ctx.fill();
      for(const p of[p1,p2]){
        ctx.fillStyle="#667eea";ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // Doors
  for(const d of doors){
    const w=walls.find(x=>x.id===d.wallId);if(!w)continue;
    const p=pointOnWall(w,d.pos);
    if(!p)continue;
    const ps=w2s(p.x,p.y);
    const ang=Math.atan2(w.y2-w.y1,w.x2-w.x1);
    const sw=d.width*cam.zoom;
    ctx.save();ctx.translate(ps.x,ps.y);ctx.rotate(ang);
    // door leaf arc
    ctx.strokeStyle="#43e97b";ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,sw,0,Math.PI/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sw,0);ctx.lineTo(sw,-sw*0.1);ctx.stroke();
    ctx.fillStyle="rgba(67,233,123,0.15)";ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,sw,0,Math.PI/2);ctx.closePath();ctx.fill();
    ctx.restore();
  }

  // Windows
  for(const wd of windows){
    const w=walls.find(x=>x.id===wd.wallId);if(!w)continue;
    const p=pointOnWall(w,wd.pos);
    if(!p)continue;
    const ps=w2s(p.x,p.y);
    const ang=Math.atan2(w.y2-w.y1,w.x2-w.x1);
    const sw=wd.width*cam.zoom;
    ctx.save();ctx.translate(ps.x,ps.y);ctx.rotate(ang);
    ctx.fillStyle="rgba(135,206,235,0.2)";ctx.fillRect(0,-3,sw,6);
    ctx.strokeStyle="#4facfe";ctx.lineWidth=1.5;
    ctx.strokeRect(0,-3,sw,6);
    ctx.beginPath();ctx.moveTo(sw/3,-3);ctx.lineTo(sw/3,3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sw*2/3,-3);ctx.lineTo(sw*2/3,3);ctx.stroke();
    ctx.restore();
  }

  // Dimensions
  for(const d of dims){
    const p1=w2s(d.x1,d.y1),p2=w2s(d.x2,d.y2);
    const mid={x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2};
    const ang=Math.atan2(p2.y-p1.y,p2.x-p1.x);
    const off=d.offset||40;
    const nx=-Math.sin(ang)*off,ny=Math.cos(ang)*off;
    ctx.strokeStyle="#ff6b6b";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(p1.x+nx,p1.y+ny);ctx.lineTo(p2.x+nx,p2.y+ny);ctx.stroke();
    // ticks
    ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p1.x+nx*0.65,p1.y+ny*0.65);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p2.x,p2.y);ctx.lineTo(p2.x+nx*0.65,p2.y+ny*0.65);ctx.stroke();
    // text
    const dist=Math.hypot(d.x2-d.x1,d.y2-d.y1);
    ctx.fillStyle="#ff6b6b";ctx.font="10px sans-serif";ctx.textAlign="center";ctx.textBaseline="bottom";
    ctx.font="bold 11px sans-serif";var txt=(dist/1000).toFixed(1)+"m";var tw=ctx.measureText(txt).width;ctx.fillStyle="rgba(22,22,40,0.7)";ctx.fillRect(mid.x+nx-tw/2-3,mid.y+ny-10,tw+6,14);ctx.fillStyle="#ff6b6b";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(txt,mid.x+nx,mid.y+ny-3);
  }

  // Furniture (from 3D sync)
  for(const f of furniture){
    const p=w2s(f.x,f.y);
    const w=f.w*cam.zoom,d=f.d*cam.zoom;
    ctx.save();ctx.translate(p.x,p.y);
    ctx.fillStyle=f.color+"66";ctx.strokeStyle=f.color;ctx.lineWidth=1.5;
    ctx.fillRect(-w/2,-d/2,w,d);ctx.strokeRect(-w/2,-d/2,w,d);
    ctx.fillStyle="rgba(255,255,255,0.5)";ctx.font="8px sans-serif";ctx.textAlign="center";
    ctx.fillText(f.name,0,3);
    ctx.restore();
  }

  // Wall drawing preview
  if(tool==="wall"&&wallDraw&&mPos){
    const p1=w2s(wallDraw.x,wallDraw.y),p2=w2s(mPos.x,mPos.y);
    ctx.strokeStyle="#667eea";ctx.lineWidth=2;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();ctx.setLineDash([]);
  }
}

function pointOnWall(w,pos){
  const dx=w.x2-w.x1,dy=w.y2-w.y1;
  const len=Math.hypot(dx,dy);if(len<1)return null;
  const r=pos/len;
  return {x:w.x1+dx*r,y:w.y1+dy*r};
}

function distToSegment(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1;
  const len2=dx*dx+dy*dy;if(len2<1)return Math.hypot(px-x1,py-y1);
  let t=((px-x1)*dx+(py-y1)*dy)/len2;t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
}

function hitTest(px,py){
  // walls
  for(const w of walls){
    if(distToSegment(px,py,w.x1,w.y1,w.x2,w.y2)<Math.max(w.thick/2,50))return{type:"wall",obj:w};
  }
  return null;
}

function detectRoom(){
  // Simple room detection from wall loops
  if(walls.length<3)return;
  saveState();
  rooms=[];
  const pts=[];
  // Build connected wall segments
  const used=new Set();
  let cur=walls[0];let path=[{x:cur.x1,y:cur.y1},{x:cur.x2,y:cur.y2}];used.add(cur.id);
  let found=true;
  while(found){
    found=false;
    for(const w of walls){
      if(used.has(w.id))continue;
      const last=path[path.length-1];
      const d1=Math.hypot(w.x1-last.x,w.y1-last.y);
      const d2=Math.hypot(w.x2-last.x,w.y2-last.y);
      if(d1<10){path.push({x:w.x2,y:w.y2});used.add(w.id);found=true;break}
      if(d2<10){path.push({x:w.x1,y:w.y1});used.add(w.id);found=true;break}
    }
  }
  // Close path
  path.push({...path[0]});
  // Calculate area
  let area=0;for(let i=0;i<path.length-1;i++)area+=path[i].x*path[i+1].y-path[i+1].x*path[i].y;
  area=Math.abs(area)/2;
  if(area>1){
    const colors={"#667eea","#f093fb","#4facfe","#43e97b","#fa709a","#764ba2","#a8a8a8"};
    rooms.push({id:nextId++,name:"房间"+(rooms.length+1),corners:path.slice(0,-1),color:colors[rooms.length%colors.length],area:Math.round(area/1e6*10)/10});
  }
  // Add remaining unconnected walls as separate rooms
  for(const w of walls){
    if(!used.has(w.id)){
      rooms.push({id:nextId++,name:"房间"+(rooms.length+1),corners:[{x:w.x1,y:w.y1},{x:w.x2,y:w.y2},{x:(w.x1+w.x2)/2+2000,y:(w.y1+w.y2)/2+2000}],color:colors[rooms.length%colors.length],area:0});
    }
  }
  render2D();rebuild3D();updateStatus();
}

c2.addEventListener("pointerdown",e=>{
  const r=c2.getBoundingClientRect();
  const wp=s2w(e.clientX-r.left,e.clientY-r.top);
  mDown=wp;mPos=wp;
  if(tool==="wall"){
    const snap=snapToEndpoint(wp,15/cam.zoom);
    const p=snap||snapToGrid(wp);
    if(!wallDraw){wallDraw=p}
    else{
      if(Math.hypot(p.x-wallDraw.x,p.y-wallDraw.y)>100){
        addWall(wallDraw.x,wallDraw.y,p.x,p.y);wallDraw=p;
      }else{wallDraw=null}
    }
    return;
  }
  if(tool==="door"||tool==="window"){
    for(const w of walls){
      if(distToSegment(wp.x,wp.y,w.x1,w.y1,w.x2,w.y2)<w.thick/2+100){
        const dx=w.x2-w.x1,dy=w.y2-w.y1;
        const len=Math.hypot(dx,dy);
        const pos=((wp.x-w.x1)*dx+(wp.y-w.y1)*dy)/len;
        if(pos>200&&pos<len-200){
          if(tool==="door")addDoor(w.id,pos,900);
          else addWindow(w.id,pos,1200);
        }
        return;
      }
    }
    return;
  }
  if(tool==="dim"){
    if(!mDown){mDown=wp;return}
    addDim(mDown.x,mDown.y,wp.x,wp.y);mDown=null;return;
  }
  if(tool==="room"){detectRoom();return}

  if(tool==="polyline"){handlePolylineClick(wp);return;}
  if(tool==="arc"){
    if(!arcDrawState){
      arcDrawState={x1:wp.x,y1:wp.y};
      document.getElementById("tool-status").textContent="  弧墙: 点第二点(弧中点)";
    }else if(!arcDrawState.x2){
      arcDrawState.x2=wp.x;arcDrawState.y2=wp.y;
      document.getElementById("tool-status").textContent="  弧墙: 点第三点(终点)";
    }else{
      // Three points: start, middle control, end -> compute arc center
      var x1=arcDrawState.x1,y1=arcDrawState.y1;
      var x3=wp.x,y3=wp.y;
      var x2=arcDrawState.x2,y2=arcDrawState.y2;
      // Perpendicular bisectors intersection = center
      var ma=(y2-y1)/(x2-x1+0.001),mb=(y3-y2)/(x3-x2+0.001);
      var cx=(ma*mb*(y1-y3)+mb*(x1+x2)-ma*(x2+x3))/(2*(mb-ma)+0.001);
      var cy=-1/ma*(cx-(x1+x2)/2)+(y1+y2)/2;
      // Check if valid
      var r=Math.hypot(cx-x1,cy-y1);
      if(r>500&&r<50000){
        window._addArcWall(x1,y1,x3,y3,cx,cy);
      }else{
        document.getElementById("tool-status").textContent="  弧墙: 弧半径不合理, 重试";
      }
      arcDrawState=null;
    }
    return;
  }

  // select
  const hit=hitTest(wp.x,wp.y);
  if(hit&&hit.type==="wall"){
    sel=hit.obj;render2D();showProps(sel);
  }else{
    sel=null;document.getElementById("props").style.display="none";render2D();
  }
});

function rebuild3D(){
  // Clear old
  while(roomG.children.length)roomG.remove(roomG.children[0]);
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(30,30),floorMat3);
  fl.rotation.x=-Math.PI/2;fl.position.y=-2;fl.receiveShadow=true;roomG.add(fl);
  // 3D Arc walls
  for(var a=0;a<wallsArc.length;a++){
    var aw=wallsArc[a];
    var shape=new THREE.Shape();
    var ir=aw.radius-aw.thick/2, or=aw.radius+aw.thick/2;
    var steps=32;
    shape.moveTo(Math.cos(aw.startAngle)*ir,Math.sin(aw.startAngle)*ir);
    for(var s=1;s<=steps;s++){
      var t=aw.startAngle+(aw.endAngle-aw.startAngle)*s/steps;
      shape.lineTo(Math.cos(t)*ir,Math.sin(t)*ir);
    }
    for(var s=steps;s>=0;s--){
      var t=aw.startAngle+(aw.endAngle-aw.startAngle)*s/steps;
      shape.lineTo(Math.cos(t)*or,Math.sin(t)*or);
    }
    shape.closePath();
    var extSettings={depth:2.8,bevelEnabled:false};
    var geo=new THREE.ExtrudeGeometry(shape,extSettings);
    var mat=new THREE.MeshStandardMaterial({color:0xF0EBE5,roughness:0.9});
    var mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(aw.cx/1000,-1.4,aw.cy/1000);
    mesh.rotation.x=0;
    mesh.castShadow=true;mesh.receiveShadow=true;
    roomG.add(mesh);
  }

  // Sky
  var skyGeo=new THREE.SphereGeometry(80,32,32);
  var skyMat=new THREE.MeshBasicMaterial({color:0x87CEEB,side:THREE.BackSide});
  var sky=new THREE.Mesh(skyGeo,skyMat);
  roomG.add(sky);
  
  // Ground plane with grass
  var groundMat=new THREE.MeshStandardMaterial({color:0x7CB342,roughness:0.9});
  var ground=new THREE.Mesh(new THREE.PlaneGeometry(60,60),groundMat);
  ground.rotation.x=-Math.PI/2;ground.position.y=-2.1;ground.receiveShadow=true;
  roomG.add(ground);
  
  // Some simple trees (cones + cylinders)
  var treePositions=[[-12,-8],[10,-10],[-10,12],[14,9]];
  var trunkMat=new THREE.MeshStandardMaterial({color:0x5D4037,roughness:0.9});
  var leafMat=new THREE.MeshStandardMaterial({color:0x4CAF50,roughness:0.8});
  for(var t=0;t<treePositions.length;t++){
    var trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.2,1.5),trunkMat);
    trunk.position.set(treePositions[t][0],-1.25,treePositions[t][1]);
    trunk.castShadow=true;roomG.add(trunk);
    var leaf=new THREE.Mesh(new THREE.ConeGeometry(0.8,1.5,6),leafMat);
    leaf.position.set(treePositions[t][0],0,treePositions[t][1]);
    leaf.castShadow=true;roomG.add(leaf);
    var leaf2=new THREE.Mesh(new THREE.ConeGeometry(0.6,1.2,6),leafMat);
    leaf2.position.set(treePositions[t][0],0.8,treePositions[t][1]);
    leaf2.castShadow=true;roomG.add(leaf2);
  }


  const wMat=loadPBRMaterial("墙面");
  const h=2800;
  for(const w of walls){
    const dx=w.x2-w.x1,dy=w.y2-w.y1;
    const len=Math.hypot(dx,dy);if(len<1)continue;
    const m=new THREE.Mesh(new THREE.BoxGeometry(len/1000,h/1000,w.thick/1000),wMat);
    m.position.set((w.x1+w.x2)/2000,h/2000,(w.y1+w.y2)/2000);
    m.rotation.y=-Math.atan2(dy,dx);
    m.castShadow=true;m.receiveShadow=true;roomG.add(m);
  }
  for(var fi=0;fi<furniture.length;fi++){
    var f=furniture[fi];
    var m=buildFurniture3D(f);
    if(m){
      m.position.set(f.x/1000,0,f.y/1000);
      m.rotation.y=(f.rotation||0)*Math.PI/180;
      m.castShadow=true;
      roomG.add(m);
    }
  }
}

window.exportSVG=function(){
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${c2.width} ${c2.height}" width="${c2.width}" height="${c2.height}">`;
  svg += `<rect width="100%" height="100%" fill="#161628"/>`;
  
  // Walls
  for(const w of walls){
    const p1=w2s(w.x1,w.y1),p2=w2s(w.x2,w.y2);
    const dx=p2.x-p1.x,dy=p2.y-p1.y;
    const len=Math.hypot(dx,dy);
    if(len<1)continue;
    const nx=-dy/len*w.thick*cam.zoom/2,ny=dx/len*w.thick*cam.zoom/2;
    const pts=`${p1.x+nx},${p1.y+ny} ${p2.x+nx},${p2.y+ny} ${p2.x-nx},${p2.y-ny} ${p1.x-nx},${p1.y-ny}`;
    svg+=`<polygon points="${pts}" fill="${w.type==="外墙"?"#ddd":"#eee"}" stroke="#999" stroke-width="1"/>`;
  }
  
  // Doors
  for(const d of doors){
    const w=walls.find(x=>x.id===d.wallId);if(!w)continue;
    const p=pointOnWall(w,d.pos);if(!p)continue;
    const ps=w2s(p.x,p.y);
    const ang=Math.atan2(w.y2-w.y1,w.x2-w.x1);
    const sw=d.width*cam.zoom;
    svg+=`<g transform="translate(${ps.x},${ps.y}) rotate(${ang*180/Math.PI})">`;
    svg+=`<path d="M0,0 A${sw},${sw} 0 0,1 ${sw},${sw}" fill="rgba(67,233,123,0.2)" stroke="#43e97b" stroke-width="1.5"/>`;
    svg+=`<line x1="${sw}" y1="0" x2="${sw}" y2="${-sw*0.1}" stroke="#43e97b" stroke-width="1.5"/>`;
    svg+=`</g>`;
  }
  
  // Rooms
  for(const r of rooms){
    const pts=r.corners.map(c=>w2s(c.x,c.y));
    const dp=pts.map(p=>`${p.x},${p.y}`).join(" ");
    svg+=`<polygon points="${dp}" fill="${r.color}22" stroke="${r.color}44" stroke-width="1" stroke-dasharray="4,4"/>`;
    const cx=pts.reduce((a,p)=>({x:a.x+p.x/pts.length,y:a.y+p.y/pts.length}),{x:0,y:0});
    svg+=`<text x="${cx.x}" y="${cx.y}" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle" font-family="Microsoft YaHei">${r.name} ${r.area}m2</text>`;
  }
  
  // Dimensions
  for(const d of dims){
    const p1=w2s(d.x1,d.y1),p2=w2s(d.x2,d.y2);
    const ang=Math.atan2(p2.y-p1.y,p2.x-p1.x);
    const nx=-Math.sin(ang)*40,ny=Math.cos(ang)*40;
    svg+=`<line x1="${p1.x+nx}" y1="${p1.y+ny}" x2="${p2.x+nx}" y2="${p2.y+ny}" stroke="#ff6b6b" stroke-width="1"/>`;
    const dist=Math.hypot(d.x2-d.x1,d.y2-d.y1);
    svg+=`<text x="${(p1.x+p2.x)/2+nx}" y="${(p1.y+p2.y)/2+ny-3}" fill="#ff6b6b" font-size="10" text-anchor="middle">${(dist/1000).toFixed(1)}m</text>`;
  }
  
  svg+=`</svg>`;
  
  const blob=new Blob([svg],{type:"image/svg+xml"});
  const a=document.createElement("a");a.download="floorplan.svg";a.href=URL.createObjectURL(blob);a.click();
};

window.splitWall=function(){
  if(!sel){document.getElementById("tool-status").textContent="  请先选中要分割的墙";return;}
  var mx=(sel.x1+sel.x2)/2, my=(sel.y1+sel.y2)/2;
  saveState();
  var len=Math.hypot(sel.x2-sel.x1,sel.y2-sel.y1);
  var dx=(sel.x2-sel.x1)/len*50, dy=(sel.y2-sel.y1)/len*50;
  walls.push({id:nextId++,x1:sel.x1,y1:sel.y1,x2:mx-dx,y2:my-dy,thick:sel.thick,type:sel.type});
  walls.push({id:nextId++,x1:mx+dx,y1:my+dy,x2:sel.x2,y2:sel.y2,thick:sel.thick,type:sel.type});
  walls=walls.filter(function(w){return w!==sel});
  sel=walls[walls.length-1];
  saveState();render2D();rebuild3D();updateStatus();
  document.getElementById("tool-status").textContent="  墙已分割为两段";
};

var clipboardFurniture=null;
var clipboardItem=null;
document.addEventListener("keydown", function(e){
  // 工具切换 1-6
  if(!e.ctrlKey && !e.metaKey && !e.shiftKey){
    const keys = {"1":"select","2":"wall","3":"door","4":"window","5":"dim","6":"room","7":"arc","8":"polyline"};
    if(keys[e.key]){ e.preventDefault(); setTool(keys[e.key]); return; }
  }
  // Ctrl shortcuts
  if(e.ctrlKey || e.metaKey){
    switch(e.key){
      case "c": if(selected&&selected.userData){clipboardFurniture=Object.assign({},selected.userData);document.getElementById("tool-status").textContent="  Copied: "+clipboardFurniture.name;e.preventDefault()}break;
      case "v": if(clipboardFurniture){saveState();furniture.push({id:nextId++,name:clipboardFurniture.name,cat:"",x:(clipboardFurniture.x||0)+500,y:(clipboardFurniture.z||clipboardFurniture.y||0)+500,w:clipboardFurniture.w||1000,d:clipboardFurniture.d||800,color:clipboardFurniture.color});render2D();rebuild3D();updateStatus();document.getElementById("tool-status").textContent="  Pasted: "+clipboardFurniture.name;e.preventDefault()}break;
      case "c": if(sel){clipboardItem={id:sel.id,x1:sel.x1,y1:sel.y1,x2:sel.x2,y2:sel.y2,thick:sel.thick,type:sel.type};document.getElementById("tool-status").textContent=" Copied wall";e.preventDefault()}break;
      case "v": if(clipboardItem){saveState();var nid=nextId++;walls.push({id:nid,x1:clipboardItem.x1+1000,y1:clipboardItem.y1,x2:clipboardItem.x2+1000,y2:clipboardItem.y2,thick:clipboardItem.thick,type:clipboardItem.type});sel=walls[walls.length-1];saveState();render2D();rebuild3D();updateStatus();document.getElementById("tool-status").textContent=" Pasted wall";e.preventDefault()}break;
      case "z": case "Z": e.shiftKey ? redo() : undo(); e.preventDefault(); break;
      case "s": e.preventDefault(); saveDoc(); break;
      case "o": e.preventDefault(); loadDoc(); break;
    }
    return;
  }
  // Other shortcuts
  switch(e.key){
    case "Delete": case "Backspace": if(sel){delWall();} break;
    case "Escape": if(tool==="polyline"){finishPolyline()}else{wallDraw=null;} render2D(); document.getElementById("tool-status").textContent="已取消"; break;
    case "+": case "=": cam.zoom*=1.2; render2D(); break;
    case "-": cam.zoom/=1.2; render2D(); break;
    case "Enter": if(tool==="polyline"){e.preventDefault();finishPolyline()}break;
      case "f": case "F": zoomFit(); break;
  }
});

// Patch pointerdown for measure
const origPointerDown = c2.onpointerdown;
c2.addEventListener("pointerdown", function(e){
  if(!measureMode) return;
  const r=c2.getBoundingClientRect();
  const wp=s2w(e.clientX-r.left,e.clientY-r.top);
  if(!measureStart){
    measureStart = wp;
    // Draw start point
    const ps = w2s(wp.x, wp.y);
    ctx.beginPath(); ctx.arc(ps.x, ps.y, 5, 0, Math.PI*2);
    ctx.fillStyle = "#ff6b6b"; ctx.fill();
  }else{
    // Draw line and show distance
    const p1 = w2s(measureStart.x, measureStart.y);
    const p2 = w2s(wp.x, wp.y);
    const dist = Math.hypot(wp.x-measureStart.x, wp.y-measureStart.y);
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = "#ff6b6b"; ctx.lineWidth = 2; ctx.stroke();
    const mid = {x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2};
    ctx.fillStyle = "#ff6b6b"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center";
    ctx.fillText((dist/1000).toFixed(2)+"m", mid.x, mid.y-8);
    measureStart = null;
    setTimeout(()=>render2D(), 2000);
  }
});

window.editRoom=function(){
  // Find room at center of view or selected room
  var wp=s2w(c2.width/2,c2.height/2);
  var closest=null, minDist=Infinity;
  for(var i=0;i<rooms.length;i++){
    var cx=0,cy=0;
    for(var j=0;j<rooms[i].corners.length;j++){cx+=rooms[i].corners[j].x;cy+=rooms[i].corners[j].y;}
    cx/=rooms[i].corners.length;cy/=rooms[i].corners.length;
    var d=Math.hypot(wp.x-cx,wp.y-cy);
    if(d<minDist){minDist=d;closest=i;}
  }
  if(closest===null||minDist>5000/cam.zoom)return;
  var newName=prompt("房间名称:",rooms[closest].name);

window.hatchPatterns = {
  // ANSI31: 45 degree parallel lines
  ansi31: function(ctx,x,y,w,h,scale){
    ctx.save();
    ctx.beginPath();
    for(var i=-h;i<w+h;i+=4*scale){
      ctx.moveTo(x+i,y);ctx.lineTo(x+i+h,y+h);
    }
    ctx.strokeStyle="rgba(100,100,100,0.3)";ctx.lineWidth=0.5;
    ctx.stroke();
    ctx.restore();
  },
  // Wood grain: horizontal wavy lines
  wood: function(ctx,x,y,w,h,scale){
    ctx.save();
    for(var i=0;i<h;i+=6*scale){
      ctx.beginPath();
      ctx.moveTo(x,y+i);
      for(var j=0;j<w;j+=3){
        ctx.lineTo(x+j,y+i+Math.sin(j*0.1)*1.5*scale);
      }
      ctx.strokeStyle="rgba(180,140,100,0.25)";ctx.lineWidth=0.5;
      ctx.stroke();
    }
    ctx.restore();
  },
  // Tile: grid pattern
  tile: function(ctx,x,y,w,h,scale){
    ctx.save();
    ctx.strokeStyle="rgba(150,150,150,0.2)";ctx.lineWidth=0.5;
    for(var i=0;i<w;i+=20*scale){ctx.beginPath();ctx.moveTo(x+i,y);ctx.lineTo(x+i,y+h);ctx.stroke();}
    for(var i=0;i<h;i+=20*scale){ctx.beginPath();ctx.moveTo(x,y+i);ctx.lineTo(x+w,y+i);ctx.stroke();}
    ctx.restore();
  },
  // Concrete: random dots
  concrete: function(ctx,x,y,w,h,scale){
    ctx.save();
    ctx.fillStyle="rgba(120,120,120,0.15)";
    var seed=12345;
    for(var i=0;i<50;i++){
      seed=(seed*9301+49297)%233280;
      var dx=seed/233280*w;
      seed=(seed*9301+49297)%233280;
      var dy=seed/233280*h;
      seed=(seed*9301+49297)%233280;
      var dr=seed/233280*3*scale+1;
      ctx.beginPath();ctx.arc(x+dx,y+dy,dr,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
};

var polarActive = false;
var polarAngles = [0, 45, 90, 135, 180, 225, 270, 315];

window.togglePolar = function(){
  polarActive = !polarActive;
  document.getElementById("tool-status").textContent = polarActive ? "  极轴追踪: 开 (0/45/90/135)" : "  极轴追踪: 关";
  render2D();
};

function snapToPolar(x1,y1,x2,y2){
  if(!polarActive) return {x:x2,y:y2};
  var dx=x2-x1, dy=y2-y1;
  var angle=Math.atan2(dy,dx)*180/Math.PI;
  if(angle<0)angle+=360;
  var bestAngle=angle, bestDiff=360;
  for(var i=0;i<polarAngles.length;i++){
    var diff=Math.abs(angle-polarAngles[i]);
    if(diff>180)diff=360-diff;
    if(diff<bestDiff){bestDiff=diff;bestAngle=polarAngles[i];}
  }
  if(bestDiff<5){
    // Snap to polar angle
    var len=Math.hypot(dx,dy);
    var rad=bestAngle*Math.PI/180;
    return {x:x1+Math.cos(rad)*len, y:y1+Math.sin(rad)*len};
  }
  return {x:x2,y:y2};
}

// Touch-to-mouse translation for better mobile support
// Also add pinch zoom
var touchDist = 0;

document.addEventListener("touchstart", function(e){
  if(e.touches.length===1){
    // Forward to pointer handlers - create a synthetic event
    var touch = e.touches[0];
    var me = new MouseEvent("pointerdown", {
      clientX: touch.clientX, clientY: touch.clientY,
      bubbles: true, cancelable: true
    });
    e.target.dispatchEvent(me);
  } else if(e.touches.length===2){
    touchDist = Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
  }
}, {passive: true});

document.addEventListener("touchmove", function(e){
  if(e.touches.length===1 && tool!=="select"){
    e.preventDefault();
    var touch = e.touches[0];
    var me = new MouseEvent("pointermove", {
      clientX: touch.clientX, clientY: touch.clientY,
      bubbles: true, cancelable: true
    });
    e.target.dispatchEvent(me);
  } else if(e.touches.length===2){
    e.preventDefault();
    var newDist = Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    var scale = newDist / touchDist;
    cam.zoom *= scale;
    cam.zoom = Math.max(0.05, Math.min(10, cam.zoom));
    touchDist = newDist;
    render2D();
  }
}, {passive: false});

document.addEventListener("touchend", function(e){
  if(e.changedTouches.length===1 && e.touches.length===0){
    var touch = e.changedTouches[0];
    var me = new MouseEvent("pointerup", {
      clientX: touch.clientX, clientY: touch.clientY,
      bubbles: true, cancelable: true
    });
    e.target.dispatchEvent(me);
  }
}, {passive: true});

  <label style="font-size:11px;color:rgba(255,255,255,0.5);display:block;margin-top:12px">房间配置</label>
  <div id="room-configs">
    <div class="room-row" style="display:flex;gap:4px;margin-bottom:4px">
      <input value="客厅" style="width:70px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:3px;padding:4px 6px;color:#fff;font-size:11px">
      <input value="25" style="width:50px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:3px;padding:4px 6px;color:#fff;font-size:11px" placeholder="m2">
      <select style="flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:3px;padding:4px 6px;color:#fff;font-size:11px">
        <option>客厅</option><option>卧室</option><option>厨房</option><option>卫生间</option><option>餐厅</option><option>书房</option><option>阳台</option>
      </select>
    </div>
  </div>
  <button onclick="addRoomRow()" style="background:transparent;border:1px dashed rgba(255,255,255,0.2);border-radius:3px;padding:3px 10px;color:rgba(255,255,255,0.5);cursor:pointer;font-size:11px;margin-top:4px">+ 添加房间</button>

  <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
    <button onclick="closeGenModal()" style="padding:6px 16px;border:1px solid rgba(255,255,255,0.15);border-radius:4px;background:transparent;color:#fff;cursor:pointer;font-size:12px">取消</button>
    <button onclick="generatePlan()" style="padding:6px 16px;border:none;border-radius:4px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;cursor:pointer;font-size:12px"> 生成布局</button>
  </div>
</div>
</div>

<script>
// ===================== 参数化户型生成器 =====================
// 基于递归二分切割算法

function addRoomRow(name, area, type) {
  const cont = document.getElementById("room-configs");
  const div = document.createElement("div");
  div.className = "room-row";
  div.style.cssText = "display:flex;gap:4px;margin-bottom:4px";
  div.innerHTML = [
    '<input value="'+(name||"房间")+'" style="width:70px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:3px;padding:4px 6px;color:#fff;font-size:11px">',
    '<input value="'+(area||"10")+'" style="width:50px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:3px;padding:4px 6px;color:#fff;font-size:11px" placeholder="m2">',
    '<select style="flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:3px;padding:4px 6px;color:#fff;font-size:11px">',
    '<option>客厅</option><option>卧室</option><option>厨房</option><option>卫生间</option><option>餐厅</option><option>书房</option><option>阳台</option></select>',
    '<button onclick="this.parentElement.remove()" style="background:transparent;border:none;color:#e74c3c;cursor:pointer;font-size:14px">×</button>',
  ].join("");
  if(type) div.querySelector("select").value = type;
  cont.appendChild(div);
}

// 初始房间配置
addRoomRow("客厅", 25, "客厅");
addRoomRow("主卧", 18, "卧室");
addRoomRow("次卧", 14, "卧室");
addRoomRow("厨房", 8, "厨房");
addRoomRow("卫生间", 5, "卫生间");
addRoomRow("餐厅", 12, "餐厅");

window.openGenModal = function() {
  document.getElementById("gen-modal").style.display = "flex";
};
window.closeGenModal = function() {
  document.getElementById("gen-modal").style.display = "none";
};

window.generatePlan = function() {
  const totalW = parseFloat(document.getElementById("gw").value) || 10000;
  const totalD = parseFloat(document.getElementById("gd").value) || 8000;

  // Read room configs
  const rows = document.querySelectorAll("#room-configs .room-row");
  const rooms_config = [];
  let totalTarget = 0;
  for(const row of rows){
    const inputs = row.querySelectorAll("input");
    const sel = row.querySelector("select");
    if(!inputs[0]||!inputs[1])continue;
    const name = inputs[0].value;
    const area = parseFloat(inputs[1].value) || 10;
    const type = sel ? sel.value : "房间";
    rooms_config.push({name, area, type});
    totalTarget += area;
  }

  if(rooms_config.length < 2) { alert("至少需要2个房间"); return; }

  // Scale areas to fit total
  const totalArea = (totalW * totalD) / 1e6;
  const scale = totalArea / totalTarget;
  rooms_config.forEach(r => r.targetArea = r.area * scale);

  // Layout algorithm: grid-based slicing
  // Sort rooms by area (descending)
  rooms_config.sort((a,b) => b.targetArea - a.targetArea);

  // Start with whole space
  const spaces = [{x:0, y:0, w:totalW, d:totalD, rooms: [...rooms_config]}];

  const final_rooms = [];

  function splitSpace(space, room) {
    const rArea = room.targetArea * 1e6;
    const currentArea = space.w * space.d;
    if(currentArea <= rArea * 1.2) {
      // Room fits
      final_rooms.push({name: room.name, type: room.type, x: space.x, y: space.y, w: space.w, d: space.d});
      return [];
    }
    // Need to split - allocate portion for this room
    const ratio = rArea / currentArea;
    // Decide split direction (wider side splits)
    if(space.w >= space.d) {
      // Vertical split
      const roomW = space.w * Math.sqrt(ratio);
      final_rooms.push({name: room.name, type: room.type, x: space.x, y: space.y, w: Math.max(roomW, 1500), d: space.d});
      return [{x: space.x + Math.max(roomW, 1500), y: space.y, w: space.w - Math.max(roomW, 1500), d: space.d}];
    } else {
      // Horizontal split
      const roomD = space.d * Math.sqrt(ratio);
      final_rooms.push({name: room.name, type: room.type, x: space.x, y: space.y, w: space.w, d: Math.max(roomD, 1500)});
      return [{x: space.x, y: space.y + Math.max(roomD, 1500), w: space.w, d: space.d - Math.max(roomD, 1500)}];
    }
  }

  let remaining = rooms_config.slice();
  let currentSpaces = [{x:0, y:0, w:totalW, d:totalD}];

  for(const room of remaining) {
    if(currentSpaces.length === 0) break;
    // Find the best space for this room
    const space = currentSpaces.shift();
    const newSpaces = splitSpace(space, room);
    currentSpaces.push(...newSpaces);
  }

  // Remaining space becomes hallway
  for(const s of currentSpaces) {
    if(s.w > 800 && s.d > 800) {
      final_rooms.push({name: "过道", type: "过道", x: s.x, y: s.y, w: s.w, d: s.d});
    }
  }

  // Generate walls from rooms
  const newWalls = [];
  const newRooms = [];
  const newDoors = [];
  const newWindows = [];

  const colors = {"客厅":"#667eea","卧室":"#f093fb","厨房":"#43e97b","卫生间":"#fa709a","餐厅":"#764ba2","书房":"#4facfe","阳台":"#84fab0","过道":"#a8a8a8"};

  for(const r of final_rooms) {
    // Room polygon
    const corners = [
      {x: r.x, y: r.y},
      {x: r.x + r.w, y: r.y},
      {x: r.x + r.w, y: r.y + r.d},
      {x: r.x, y: r.y + r.d},
    ];
    const area_m2 = (r.w * r.d) / 1e6;
    newRooms.push({
      id: nextId++, name: r.name, type: r.type,
      corners: corners,
      color: colors[r.type] || "#888888",
      area: Math.round(area_m2 * 10) / 10
    });

    // Walls (only exterior - interior shared walls handled by adjacency)
    const ws = [
      {x1:r.x,y1:r.y,x2:r.x+r.w,y2:r.y},
      {x1:r.x+r.w,y1:r.y,x2:r.x+r.w,y2:r.y+r.d},
      {x1:r.x+r.w,y1:r.y+r.d,x2:r.x,y2:r.y+r.d},
      {x1:r.x,y1:r.y+r.d,x2:r.x,y2:r.y},
    ];
    for(const w of ws) {
      // Check if wall already exists (within tolerance)
      let found = false;
      for(const ew of newWalls) {
        const d1 = Math.hypot(ew.x1-w.x1, ew.y1-w.y1) + Math.hypot(ew.x2-w.x2, ew.y2-w.y2);
        const d2 = Math.hypot(ew.x1-w.x2, ew.y1-w.y2) + Math.hypot(ew.x2-w.x1, ew.y2-w.y1);
        if(d1 < 50 || d2 < 50) { found = true; break; }
      }
      if(!found) {
        const dx = w.x2-w.x1, dy = w.y2-w.y1;
        const len = Math.hypot(dx, dy);
        if(len > 100) {
          newWalls.push({id: nextId++, x1:w.x1, y1:w.y1, x2:w.x2, y2:w.y2,
            thick: (w.x1===0||w.x1===totalW||w.y1===0||w.y1===totalD||w.x2===0||w.x2===totalW||w.y2===0||w.y2===totalD) ? 240 : 150,
            type: (w.x1===0||w.x1===totalW||w.y1===0||w.y1===totalD||w.x2===0||w.x2===totalW||w.y2===0||w.y2===totalD) ? "外墙" : "内墙"
          });
        }
      }
    }
  }

  // Add doors (one per room, on the longest wall)
  for(const r of final_rooms) {
    const ws = [
      {x1:r.x,y1:r.y,x2:r.x+r.w,y2:r.y, side:"top"},
      {x1:r.x+r.w,y1:r.y,x2:r.x+r.w,y2:r.y+r.d, side:"right"},
      {x1:r.x+r.w,y1:r.y+r.d,x2:r.x,y2:r.y+r.d, side:"bottom"},
      {x1:r.x,y1:r.y+r.d,x2:r.x,y2:r.y, side:"left"},
    ];
    // Find the wall that connects to another room or is exterior
    for(const w of ws) {
      const dx = w.x2-w.x1, dy = w.y2-w.y1;
      const len = Math.hypot(dx, dy);
      if(len > 2000) {
        const pos = len * 0.3;
        // Find matching wall
        let wallId = null;
        for(const nw of newWalls) {
          const d1 = Math.hypot(nw.x1-w.x1, nw.y1-w.y1) + Math.hypot(nw.x2-w.x2, nw.y2-w.y2);
          const d2 = Math.hypot(nw.x1-w.x2, nw.y1-w.y2) + Math.hypot(nw.x2-w.x1, nw.y2-w.y1);
          if(d1 < 50 || d2 < 50) { wallId = nw.id; break; }
        }
        if(wallId && len > 1500) {
          newDoors.push({id: nextId++, wallId, pos, width: 900});
          break;
        }
      }
    }
  }

  // Clear and load
  if(!confirm("将清空当前绘图并加载生成户型，确定？")) return;

  walls.length = 0; doors.length = 0; windows.length = 0;
  rooms.length = 0; dims.length = 0; furniture.length = 0;

  newWalls.forEach(w => walls.push(w));
  newDoors.forEach(d => doors.push(d));
  newRooms.forEach(r => rooms.push(r));

  saveState();
  closeGenModal();
  render2D();
  rebuild3D();
  updateStatus();
  zoomFit();
  document.getElementById("tool-status").textContent = ` 户型已生成: ${rooms.length}个房间`;

  // Add furniture suggestions
  for(const r of final_rooms) {
    if(r.type === "卧室") {
      furniture.push({id:nextId++,name:"双人床",cat:"",x:r.x+r.w*0.3,y:r.y+r.d*0.4,w:2000,d:1800,color:"#D2B48C"});
      furniture.push({id:nextId++,name:"衣柜",cat:"",x:r.x+r.w*0.8,y:r.y+r.d*0.2,w:1800,d:600,color:"#C4A882"});
    } else if(r.type === "客厅") {
      furniture.push({id:nextId++,name:"沙发",cat:"",x:r.x+r.w*0.3,y:r.y+r.d*0.7,w:2200,d:850,color:"#8B4513"});
      furniture.push({id:nextId++,name:"茶几",cat:"",x:r.x+r.w*0.5,y:r.y+r.d*0.5,w:1200,d:600,color:"#D2691E"});
      furniture.push({id:nextId++,name:"电视柜",cat:"",x:r.x+r.w*0.5,y:r.y+r.d*0.15,w:1800,d:400,color:"#3C3C3C"});
    } else if(r.type === "餐厅") {
      furniture.push({id:nextId++,name:"餐桌",cat:"",x:r.x+r.w*0.5,y:r.y+r.d*0.5,w:1400,d:800,color:"#DEB887"});
      furniture.push({id:nextId++,name:"餐椅",cat:"",x:r.x+r.w*0.35,y:r.y+r.d*0.65,w:480,d:520,color:"#C4A882"});
      furniture.push({id:nextId++,name:"餐椅",cat:"",x:r.x+r.w*0.65,y:r.y+r.d*0.65,w:480,d:520,color:"#C4A882"});
    } else if(r.type === "厨房") {
      furniture.push({id:nextId++,name:"冰箱",cat:"",x:r.x+r.w*0.85,y:r.y+r.d*0.5,w:900,d:800,color:"#C0C0C0"});
    } else if(r.type === "卫生间") {
      furniture.push({id:nextId++,name:"马桶",cat:"",x:r.x+r.w*0.3,y:r.y+r.d*0.3,w:400,d:700,color:"#F5F5F5"});
      furniture.push({id:nextId++,name:"洗手盆",cat:"",x:r.x+r.w*0.7,y:r.y+r.d*0.7,w:600,d:500,color:"#FFFFFF"});
    }
  }
  saveState();
  render2D();
  rebuild3D();
  updateStatus();
};

// Add generate button to header
document.addEventListener("DOMContentLoaded", function() {
  const header = document.getElementById("header");
  if(header) {
    const genBtn = document.createElement("button");
    genBtn.className = "btn btn-p";
    genBtn.innerHTML = " 生成";
    genBtn.onclick = window.openGenModal;
    const exportBtn = header.querySelector('[onclick="exportDXF()"]');
    if(exportBtn) header.insertBefore(genBtn, exportBtn);
    else header.appendChild(genBtn);
  }
});
</script>

</body>
</html>
