<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DXF ????? ? CAD AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;color:#e0e0e0;font-family:'Inter','Microsoft YaHei',system-ui,sans-serif;overflow:hidden;height:100vh}
#header{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;display:flex;align-items:center;padding:0 20px;background:rgba(10,10,18,0.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05);gap:12px}
#header h1{font-size:14px;font-weight:700;color:#fff;letter-spacing:1px}
#header .sub{font-size:9px;color:rgba(255,255,255,0.25)}
#dropzone{position:fixed;top:52px;left:0;right:0;bottom:40px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;transition:all .3s;cursor:pointer}
#dropzone.drag{background:rgba(96,165,250,0.05);border:2px dashed rgba(96,165,250,0.3)}
#dropzone .icon{font-size:48px;opacity:0.3}
#dropzone p{font-size:13px;color:rgba(255,255,255,0.2)}
#dropzone .hint{font-size:9px;color:rgba(255,255,255,0.1);margin-top:4px}
#canvas-container{position:fixed;top:52px;left:0;right:0;bottom:40px;display:none}
#status{position:fixed;bottom:0;left:0;right:0;height:40px;display:flex;align-items:center;padding:0 20px;background:rgba(10,10,18,0.9);border-top:1px solid rgba(255,255,255,0.04);font-size:10px;color:rgba(255,255,255,0.2);gap:12px;z-index:100}
#status .info{color:rgba(255,255,255,0.4);font-weight:600}
#file-input{display:none}
#back-btn{position:fixed;top:8px;right:12px;z-index:101;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:9px;transition:all .2s;text-decoration:none}
#back-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
</style>
</head>
<body>

<div id="header">
  <h1>DXF ???</h1>
  <span class="sub">Drag & Drop ? ?? GB/T 50001 ??</span>
  <a href="index.html" id="back-btn">? ??</a>
</div>

<div id="dropzone">
  <div class="icon">??</div>
  <p>?? DXF ???????????</p>
  <div class="hint">?? AutoCAD 2000-2024 ? ??/??/??????</div>
</div>

<div id="canvas-container"></div>

<div id="status">
  <span class="info">??</span>
  <span>?? .dxf ??????</span>
</div>

<input type="file" id="file-input" accept=".dxf">

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.161.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.161.0/examples/jsm/"}}</script>

<script type="module">
import * as T from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { DxfViewer } from "https://unpkg.com/dxf-viewer@1.0.47/src/index.js";

const dropzone = document.getElementById("dropzone");
const container = document.getElementById("canvas-container");
const fileInput = document.getElementById("file-input");
const statusEl = document.querySelector("#status .info");

let viewer = null;

function initViewer() {
  if (viewer) return;
  container.style.display = "block";
  dropzone.style.display = "none";
  
  viewer = new DxfViewer(container, { 
    clearColor: 0x0a0a12,
    autoResize: true
  });
  viewer.setBackgroundColor(0x0a0a12);
}

function loadFile(file) {
  statusEl.textContent = "???...";
  initViewer();
  
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const buffer = e.target.result;
      statusEl.textContent = "???...";
      
      // Use the viewer's render method
      await viewer.render(buffer, file.name);
      
      statusEl.textContent = "? " + file.name + " ? " + (buffer.byteLength / 1024).toFixed(1) + "KB";
    } catch(err) {
      statusEl.textContent = "? ????: " + err.message;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// Drag & drop
dropzone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropzone.classList.add("drag");
});
dropzone.addEventListener("dragleave", () => {
  dropzone.classList.remove("drag");
});
dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropzone.classList.remove("drag");
  const files = e.dataTransfer.files;
  if (files.length > 0) loadFile(files[0]);
});

// Click to select
dropzone.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", (e) => {
  if (e.target.files.length > 0) loadFile(e.target.files[0]);
});

// Handle canvas container drops too
container.addEventListener("dragover", (e) => e.preventDefault());
container.addEventListener("drop", (e) => {
  e.preventDefault();
  const files = e.dataTransfer.files;
  if (files.length > 0) loadFile(files[0]);
});

console.log("DXF Viewer ready");
</script>
</body>
</html>
