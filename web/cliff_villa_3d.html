<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CLIFF VILLA ? Three.js 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080b16;color:#fff;font-family:Inter,Microsoft YaHei,system-ui,sans-serif;overflow:hidden;height:100vh;user-select:none}
#cw{position:fixed;top:0;left:0;right:0;bottom:0}
#hud{position:fixed;top:24px;left:28px;z-index:10;pointer-events:none}
#hud h1{font-size:20px;font-weight:700;color:#fff;letter-spacing:3px}
#hud .sub{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-top:4px}
#layers{position:fixed;right:16px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:3px}
.lyr-btn{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:9px;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);transition:all .2s;font-weight:500;width:78px}
.lyr-btn:hover{background:rgba(255,255,255,0.08)}
.lyr-btn .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.lyr-btn.on .dot{background:#60a5fa;box-shadow:0 0 6px rgba(96,165,250,0.5)}
.lyr-btn.off .dot{background:#333}
#info{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:10;padding:10px 20px;border-radius:10px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.06);text-align:center;font-size:12px;pointer-events:none;white-space:nowrap}
#info .nm{font-weight:700;color:#e0e0e0}
#info .ds{font-size:10px;color:rgba(255,255,255,0.4)}
#bar{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:4px;background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);padding:4px;border-radius:10px;border:1px solid rgba(255,255,255,0.06)}
.cb{background:rgba(255,255,255,0.06);border:none;color:rgba(255,255,255,0.5);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:10px;font-weight:600;transition:all .2s}
.cb:hover{background:rgba(255,255,255,0.12);color:#fff}
.cb.on{background:rgba(96,165,250,0.2);color:#60a5fa}
#ld{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:#080b16;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;transition:opacity .5s}
#ld.h{opacity:0;pointer-events:none}
.sp{width:36px;height:36px;border-radius:50%;border:3px solid rgba(255,255,255,0.04);border-top-color:#60a5fa;animation:s 1s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="ld"><div class="sp"></div><p>Loading Three.js scene ...</p></div>
<div id="cw"></div>
<div id="hud"><h1>Cliff Villa</h1><div class="sub">THREE.JS FLAGSHIP</div></div>
<div id="layers">
  <div class="lyr-btn on" data-l="0"><span class="dot"></span>Structure</div>
  <div class="lyr-btn on" data-l="1"><span class="dot"></span>Glass</div>
  <div class="lyr-btn on" data-l="2"><span class="dot"></span>Pool</div>
  <div class="lyr-btn on" data-l="3"><span class="dot"></span>Interior</div>
  <div class="lyr-btn on" data-l="4"><span class="dot"></span>Landscape</div>
</div>
<div id="info"><span class="nm">Cliff Villa</span> <span class="ds">Drag to rotate ? Scroll to zoom ? Click objects</span></div>
<div id="bar">
  <button class="cb on" id="bRot">? Auto</button>
  <button class="cb" id="bReset">?? Reset</button>
  <button class="cb" id="bNight">?? Night</button>
  <button class="cb" id="bSnap">?? Snap</button>
</div>
<script type="importmap">{"imports":{"three":"../lib/three.module.js","three/addons/":"../lib/"}}</script>
<script type="module">
import * as T from "three";
import { OrbitControls } from "three/addons/OrbitControls.js";

const cw=document.getElementById("cw"),W=cw.clientWidth,H=cw.clientHeight;
const scene=new T.Scene();scene.background=new T.Color(0x080b16);scene.fog=new T.FogExp2(0x080b16,0.000004);
const camera=new T.PerspectiveCamera(45,W/H,100,400000);camera.position.set(35000,28000,42000);
const renderer=new T.WebGLRenderer({antialias:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=T.PCFSoftShadowMap;
renderer.toneMapping=T.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;
cw.appendChild(renderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);
controls.target.set(0,6000,0);controls.enableDamping=true;controls.dampingFactor=0.06;
controls.minDistance=8000;controls.maxDistance=120000;controls.maxPolarAngle=Math.PI/2.1;
controls.autoRotate=true;controls.autoRotateSpeed=0.8;controls.update();

// Lights
const al=new T.AmbientLight(0x223355,0.4);scene.add(al);
const hl=new T.HemisphereLight(0x8899cc,0x223366,0.5);scene.add(hl);
const sl=new T.DirectionalLight(0xffeedd,1.8);
sl.position.set(60000,80000,40000);sl.castShadow=true;
sl.shadow.mapSize.width=2048;sl.shadow.mapSize.height=2048;
sl.shadow.camera.near=100;sl.shadow.camera.far=200000;
sl.shadow.camera.left=-50000;sl.shadow.camera.right=50000;
sl.shadow.camera.top=50000;sl.shadow.camera.bottom=-50000;
scene.add(sl);scene.add(sl.target);
const bl=new T.DirectionalLight(0x4488ff,0.3);bl.position.set(-40000,30000,-50000);scene.add(bl);
const fl=new T.DirectionalLight(0x4488ff,0.2);fl.position.set(-30000,20000,50000);scene.add(fl);

// Materials
const M={};
M.ground=new T.MeshStandardMaterial({color:0x2a5a2a,roughness:0.9,metalness:0});
M.slab=new T.MeshStandardMaterial({color:0x3a3a42,roughness:0.6,metalness:0.1});
M.wall=new T.MeshStandardMaterial({color:0xd8d4cc,roughness:0.7,metalness:0});
M.glass=new T.MeshPhysicalMaterial({color:0x88ccff,roughness:0.05,metalness:0,transparent:true,opacity:0.2,ior:1.5,side:T.DoubleSide});
M.frame=new T.MeshStandardMaterial({color:0x444455,roughness:0.5,metalness:0.3});
M.deck=new T.MeshStandardMaterial({color:0x7a6a4a,roughness:0.85,metalness:0});
M.pool=new T.MeshStandardMaterial({color:0xc8c0b8,roughness:0.9,metalness:0});
M.water=new T.MeshPhysicalMaterial({color:0x1a7a9a,roughness:0,metalness:0,transparent:true,opacity:0.6,ior:1.33});
M.plight=new T.MeshStandardMaterial({color:0xffdd88,roughness:0.3,metalness:0,emissive:0xffdd88,emissiveIntensity:0.3});
M.col=new T.MeshStandardMaterial({color:0x889098,roughness:0.5,metalness:0.2});
M.stairs=new T.MeshStandardMaterial({color:0x7a6a4a,roughness:0.8,metalness:0});
M.wood=new T.MeshStandardMaterial({color:0x6b3a1a,roughness:0.7,metalness:0});
M.dark=new T.MeshStandardMaterial({color:0x4a3020,roughness:0.7,metalness:0});
M.tt=new T.MeshStandardMaterial({color:0x4a3525,roughness:0.9,metalness:0});
M.tc=new T.MeshStandardMaterial({color:0x2a6b2a,roughness:0.8,metalness:0});
M.car=new T.MeshStandardMaterial({color:0xbb2222,roughness:0.3,metalness:0.6});
M.cg=new T.MeshPhysicalMaterial({color:0x1a2a3a,roughness:0,metalness:0.1,transparent:true,opacity:0.35,ior:1.5});
M.roof=new T.MeshStandardMaterial({color:0x4a4a4a,roughness:0.7,metalness:0.1});
M.lit=new T.MeshStandardMaterial({color:0xffeedd,emissive:0xffeedd,emissiveIntensity:3});

// Layer containers
const L={0:[],1:[],2:[],3:[],4:[]};
function a(m,l){L[l].push(m);scene.add(m);return m}
function bx(w,d,h,mt,x,y,z,l){const g=new T.BoxGeometry(w,h,d);const m=new T.Mesh(g,mt);m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;return a(m,l)}
function cy(rt,rb,h,mt,x,y,z,l,s){s=s||24;const g=new T.CylinderGeometry(rt,rb,h,s);const m=new T.Mesh(g,mt);m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;return a(m,l)}
function sp(r,mt,x,y,z,l){const g=new T.SphereGeometry(r,16,12);const m=new T.Mesh(g,mt);m.position.set(x,y,z);m.castShadow=true;return a(m,l)}

// Terrain
const tg=new T.PlaneGeometry(120000,100000);const tm=new T.Mesh(tg,M.ground);tm.position.set(0,-50,0);tm.rotation.x=-Math.PI/2;tm.receiveShadow=true;a(tm,0);
bx(40000,32000,400,M.slab,0,200,0,0);
bx(4000,300,3200,M.wall,-2000,-8000,300,0);bx(3000,300,3200,M.wall,3000,-8000,300,0);bx(2000,300,3200,M.wall,7000,-8000,300,0);
bx(300,4000,3200,M.wall,9000,-10000,300,0);bx(300,4000,3200,M.wall,-9000,-10000,300,0);
bx(24000,12000,300,M.slab,2000,-4000,3500,0);bx(26000,14000,200,M.roof,2000,-4000,7000,0);bx(16000,5000,200,M.deck,-2000,13000,1200,0);

// Columns
[[-6000,-4000],[6000,-4000],[-6000,4000],[6000,4000],[-3000,-5000],[3000,-5000],[-3000,5000],[3000,5000],[-8000,-2000],[8000,-2000],[-8000,2000],[8000,2000]].forEach(p=>cy(120,120,3500,M.col,p[0],p[1],2100,0));
// Stairs
for(let i=0;i<18;i++)bx(1400,300,160,M.stairs,-3800,-6000-i*350,700+i*200,0);

// Glass curtain wall (Layer 1)
for(let i=0;i<12;i++){const x=-6000+i*2000;const gm=new T.Mesh(new T.BoxGeometry(1800,3000,30),M.glass);gm.position.set(x,8000,1800);gm.castShadow=false;gm.receiveShadow=false;a(gm,1);bx(30,30,3000,M.frame,x-900,8000,300,1)}
const gm2=new T.Mesh(new T.BoxGeometry(30,3000,4000),M.glass);gm2.position.set(10000,1800,-10000);gm2.castShadow=false;gm2.receiveShadow=false;a(gm2,1);

// Pool (Layer 2)
bx(9000,5000,2000,M.pool,-3000,11000,-1000,2);bx(8400,4400,200,M.water,-3000,11200,0,2);
for(let i=0;i<10;i++)bx(800,30,20,M.plight,-6000+i*1200,11200,5,2);

// Interior (Layer 3)
bx(3500,1200,700,M.wood,-2000,-2000,300,3);bx(1800,1000,350,M.dark,-1500,-1800,600,3);
bx(2800,1200,750,M.wood,4000,2000,300,3);
[[-900,0],[900,0],[0,-700],[0,700]].forEach(([dx,dz])=>bx(400,400,850,M.dark,4000+dx,2000+dz,300,3));
bx(2000,300,2800,M.dark,7000,2000,300,3);bx(1800,600,1000,M.dark,6000,4000,300,3);bx(2000,800,300,M.wood,2000,-1000,300,3);
[[-3000,1000,6000],[0,3000,6000],[3000,2000,6000],[5000,2000,6000]].forEach(([x,y,z])=>sp(60,M.lit,x,y,3500,3));

// Landscape (Layer 4) - Trees
const trees=[[-18000,6000],[-15000,10000],[14000,9000],[15000,-2000],[-14000,-12000],[14000,-10000],[18000,14000],[-18000,-14000],[12000,15000],[-12000,15000],[16000,4000],[-16000,4000]];
trees.forEach(([tx,tz])=>{cy(50,60,2000,M.tt,tx,tz,1000,4);const cr=600+Math.random()*300;sp(cr,M.tc,tx,tz,2500+Math.random()*300,4);sp(cr*0.7,M.tc,tx+300+Math.random()*200,tz+200+Math.random()*200,2800+Math.random()*200,4);sp(cr*0.7,M.tc,tx-300+Math.random()*200,tz-200+Math.random()*200,2800+Math.random()*200,4)});
// Car
bx(4500,1800,700,M.car,7000,-14000,350,4);bx(2500,1500,300,M.cg,7800,-13500,700,4);
[[-1400,-600],[1400,-600],[-1400,600],[1400,600]].forEach(([wx,wz])=>{cy(180,180,120,new T.MeshStandardMaterial({color:0x111111,roughness:0.9}),7000+wx,-14000+wz,0,4);cy(80,80,125,new T.MeshStandardMaterial({color:0x555555,roughness:0.5,metalness:0.3}),7000+wx,-14000+wz,0,4)});

// Grid
const grid=new T.GridHelper(80000,40,0x333355,0x222244);grid.position.y=5;scene.add(grid);

// Stars
const sc=2000;const sg=new T.BufferGeometry();const sp2=new Float32Array(sc*3);const ss2=new Float32Array(sc);
for(let i=0;i<sc;i++){sp2[i*3]=(Math.random()-0.5)*400000;sp2[i*3+1]=30000+Math.random()*80000;sp2[i*3+2]=(Math.random()-0.5)*400000;ss2[i]=0.5+Math.random()*1.5}
sg.setAttribute("position",new T.BufferAttribute(sp2,3));sg.setAttribute("size",new T.BufferAttribute(ss2,1));
const sm2=new T.PointsMaterial({color:0xffffff,size:2,transparent:true,opacity:0.7,sizeAttenuation:true});const stars=new T.Points(sg,sm2);scene.add(stars);

// Moon
const moon=new T.Mesh(new T.SphereGeometry(1200,24,16),new T.MeshStandardMaterial({color:0xddddcc,roughness:0.9,metalness:0,emissive:0x888877,emissiveIntensity:0.1}));moon.position.set(40000,50000,-70000);scene.add(moon);

// Interaction
const rc=new T.Raycaster(),pt=new T.Vector2();
renderer.domElement.addEventListener("pointermove",e=>{pt.x=(e.clientX/cw.clientWidth)*2-1;pt.y=-(e.clientY/cw.clientHeight)*2+1});
renderer.domElement.addEventListener("click",()=>{rc.setFromCamera(pt,camera);const hits=rc.intersectObjects(scene.children,true);for(const hit of hits){const o=hit.object;const mt=o.material;let info=null;if(mt===M.wall)info=["Concrete Wall","RC 300mm"];else if(mt===M.glass||mt===M.frame)info=["Curtain Wall","Low-E insulated glass"];else if(mt===M.water||mt===M.pool)info=["Infinity Pool","9x5m heated LED"];else if(mt===M.car)info=["Sports Car","Red 4.5m"];else if(mt===M.tc||mt===M.tt)info=["Cypress","Height 4-6m"];else if(mt===M.wood||mt===M.dark)info=["Oak Furniture","Custom 2024"];else if(mt===M.col)info=["Column","RC 240mm"];else if(mt===M.roof)info=["Roof Slab","RC 200mm"];if(info){document.getElementById("info").innerHTML='<span class="nm">'+info[0]+'</span> <span class="ds">'+info[1]+'</span>';return}}});

// Layer toggle
document.querySelectorAll(".lyr-btn").forEach(btn=>{btn.addEventListener("click",()=>{const l=parseInt(btn.dataset.l);const vis=!L[l][0]?.visible;L[l].forEach(m=>m.visible=vis);btn.classList.toggle("on",vis);btn.classList.toggle("off",!vis)})});

// Buttons
document.getElementById("bRot").addEventListener("click",()=>{controls.autoRotate=!controls.autoRotate;document.getElementById("bRot").classList.toggle("on")});
document.getElementById("bReset").addEventListener("click",()=>{camera.position.set(35000,28000,42000);controls.target.set(0,6000,0);controls.update()});
let night=false;
document.getElementById("bNight").addEventListener("click",()=>{night=!night;document.getElementById("bNight").classList.toggle("on");if(night){scene.background=new T.Color(0x050510);scene.fog=new T.FogExp2(0x050510,0.000005);sl.intensity=0.15;al.intensity=0.15}else{scene.background=new T.Color(0x080b16);scene.fog=new T.FogExp2(0x080b16,0.000004);sl.intensity=1.8;al.intensity=0.4}});
document.getElementById("bSnap").addEventListener("click",()=>{renderer.render(scene,camera);const a=document.createElement("a");a.href=renderer.domElement.toDataURL("image/png");a.download="cliff_villa_3d.png";a.click()});
window.addEventListener("resize",()=>{const w=cw.clientWidth,h=cw.clientHeight;camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h)});

// Animation
let t=0;
function anim(){requestAnimationFrame(anim);t+=0.01;controls.update();
// Animate pool water
L[2].forEach(m=>{if(m.material===M.water&&m.geometry.attributes.position){const pos=m.geometry.attributes.position;if(!m.userData.oY){const a2=pos.array;m.userData.oY=new Float32Array(a2)}if(m.userData.oY){const arr=pos.array,oy=m.userData.oY;for(let i=0;i<arr.length;i+=3)arr[i+1]=oy[i+1]+Math.sin(t*2+arr[i]*0.01+arr[i+2]*0.008)*8;pos.needsUpdate=true}}});
// Star twinkle
const sA=sg.attributes.size.array;for(let i=0;i<sc;i++)sA[i]=0.5+Math.sin(t*0.5+i*0.01)*0.8+1;sg.attributes.size.needsUpdate=true;
moon.scale.setScalar(1+Math.sin(t*0.3)*0.03);
renderer.render(scene,camera)}
anim();
setTimeout(()=>document.getElementById("ld").classList.add("h"),300);
console.log("Cliff Villa 3D: "+scene.children.length+" objects");
</script>
</body>
</html>
